name: WPT conformance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Weekly, Monday 06:00 UTC (after the WPT update job)
  push:
    branches:
      - master
    paths:
      - 'lib/**'
      - 'encodings/**'
      - 'test/wpt/**'
      - '.github/workflows/wpt-conformance.yml'

permissions:
  contents: read
  issues: write

concurrency:
  group: wpt-conformance
  cancel-in-progress: true

jobs:
  report:
    name: Report (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24] # from v22 to the latest LTS
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install --include=dev

      - name: Generate conformance report
        run: node test/wpt/report.js > "section-${{ matrix.node }}.md"

      - name: Show in job summary
        run: cat "section-${{ matrix.node }}.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload section
        uses: actions/upload-artifact@v4
        with:
          name: wpt-section-${{ matrix.node }}
          path: section-${{ matrix.node }}.md

  publish:
    name: Publish tracking issue
    needs: report
    runs-on: ubuntu-latest
    steps:
      - name: Download sections
        uses: actions/download-artifact@v4
        with:
          pattern: wpt-section-*
          merge-multiple: true

      - name: Assemble report
        run: |
          {
            echo '<!-- wpt-conformance-report -->'
            echo '## WPT encoding conformance — iconv-lite'
            echo ''
            echo 'Upstream [web-platform-tests `encoding/`](https://github.com/web-platform-tests/wpt/tree/master/encoding) run unmodified against iconv-lite (via a `TextDecoder`/`TextEncoder` shim), across Node LTS versions. Failures are real gaps vs the WHATWG Encoding Standard.'
            echo ''
            cat $(ls -v section-*.md)
            echo ''
            echo '---'
            echo '_Generated by `test/wpt/report.js`._'
          } > wpt-report.md

      - name: Create or update tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('wpt-report.md', 'utf8');
            const title = 'WPT encoding conformance tracking';

            const { owner, repo } = context.repo;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', per_page: 100
            });
            const issue = existing.find(i => i.title === title && !i.pull_request);

            if (issue) {
              await github.rest.issues.update({ owner, repo, issue_number: issue.number, body });
              core.info(`Updated issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({ owner, repo, title, body });
              core.info(`Created issue #${created.data.number}`);
            }
